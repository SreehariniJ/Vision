global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm:8001"]

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]

  # Optional: add DCGM exporter on the host or as a container for GPU metrics.
  # - job_name: dcgm-gpu
  #   static_configs:
  #     - targets: ["host.docker.internal:9400"]
